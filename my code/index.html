<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-2543191032584842">
    <title>Multi-Tab Redirect</title>
    <!-- Start cookieyes banner --> <script id="cookieyes" type="text/javascript" src="https://cdn-cookieyes.com/client_data/aed4b299db5a82fcb517bc229aa9c937/script.js"></script> <!-- End cookieyes banner -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 50px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .redirect-btn {
            padding: 18px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .redirect-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .redirect-btn:active {
            transform: translateY(-1px);
        }

        .btn-blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-blue:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a4299 100%);
        }

        .btn-green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-green:hover {
            background: linear-gradient(135deg, #0d8a7a 0%, #2ce06e 100%);
        }

        .btn-red {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        }

        .btn-red:hover {
            background: linear-gradient(135deg, #d90770 0%, #e65e00 100%);
        }

        .info-text {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #ddd;
            font-size: 13px;
            color: #999;
        }

        .icon {
            font-size: 24px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🚀 Quick Redirect</h1>
        <p class="subtitle">Click two times to reach the content you're looking for</p>
        
        <div class="button-group">
            <button class="redirect-btn btn-blue" onclick="openMultipleTabs('redirect1')">
                <span class="icon">🚀</span>Redirect Now
            </button>
        </div>
    </div>

    <script>
        let clickCount = 0;
        
        // Define redirect configurations
        const redirectConfigs = {
            redirect1: {
                urls: [
                    'https://www.google.com',
                    'https://www.youtube.com/channel/UC9rTjvHqkYl8n2sKZyXoQw'
                ]
            }
        };
    

        function openMultipleTabs(configKey) {
            const config = redirectConfigs[configKey];
            
            if (config && config.urls) {
                // Open URL based on click count
                window.open(config.urls[clickCount], '_blank');
                
                // Toggle between 0 and 1
                clickCount = (clickCount + 1) % config.urls.length;
            }
        }
    </script>
</body>
</html>
