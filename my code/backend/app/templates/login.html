{% extends "base.html" %}
{% block title %}Log in — PPC Platform{% endblock %}
{% block head %}
<style>
  .form-wrap { max-width: 420px; margin: 2rem auto; background: linear-gradient(145deg, rgba(30,41,59,0.6), rgba(15,23,42,0.6)); border: 1px solid rgba(148,163,184,0.15); border-radius: 20px; padding: 2rem; }
  .form-wrap h2 { text-align: center; font-size: 1.5rem; margin-bottom: 0.5rem; }
  .form-wrap .sub { text-align: center; color: #94a3b8; font-size: 0.875rem; margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; margin-bottom: 0.35rem; font-size: 0.875rem; color: #cbd5e1; }
  .form-group input { width: 100%; padding: 0.6rem 0.75rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: #fff; outline: none; }
  .form-group input:focus { border-color: #22d3ee; }
  .login-btn { width: 100%; margin-top: 0.5rem; padding: 0.75rem; border-radius: 10px; background: #22d3ee; color: #0f172a; font-weight: 600; border: none; cursor: pointer; }
  .login-btn:hover { background: #06b6d4; }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .signup-link { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #94a3b8; }
  .back { position: absolute; top: 1rem; left: 1rem; color: #94a3b8; font-size: 0.875rem; }
</style>
{% endblock %}
{% block content %}
<a href="/" class="back">← Back</a>
<div class="form-wrap">
  <h2>Log in</h2>
  <p class="sub">Welcome back</p>
  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <div id="login-err" class="err"></div>
    <div id="login-msg" class="msg"></div>
    <button type="submit" class="login-btn" id="login-btn">Log in</button>
  </form>
  <p class="signup-link">No account? <a href="/signup">Sign up</a></p>
</div>
<script>
(function() {
  if (new URLSearchParams(window.location.search).get('registered') === '1') {
    document.getElementById('login-msg').textContent = 'Account created. Log in below.';
  }

  var form = document.getElementById('login-form');
  var errEl = document.getElementById('login-err');
  var btn = document.getElementById('login-btn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    errEl.textContent = '';
    btn.disabled = true;

    window.PPC_API.login(form.email.value.trim(), form.password.value)
      .then(function(res) {
        var next = new URLSearchParams(window.location.search).get('next');
        if (next && next.startsWith('/')) {
          window.location.href = next;
          return;
        }
        var role = (res.user && res.user.role) || 'user';
        if (role === 'client') window.location.href = '/dashboard/client';
        else if (role === 'affiliate') window.location.href = '/dashboard/affiliate';
        else window.location.href = '/dashboard';
      })
      .catch(function(err) {
        errEl.textContent = (err.data && err.data.error) || err.message || 'Login failed';
        btn.disabled = false;
      });
  });
})();
</script>
{% endblock %}
