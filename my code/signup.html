<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - LeadFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background: radial-gradient(circle at top, #0f172a 0%, #020617 70%);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.signup-container{
  width:100%;
  max-width:420px;
  background:linear-gradient(145deg, rgba(30,41,59,0.6), rgba(15,23,42,0.6));
  border:1px solid rgba(148,163,184,0.15);
  border-radius:20px;
  padding:40px;
}

h2{
  text-align:center;
  font-size:28px;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#94a3b8;
  margin-bottom:30px;
  font-size:14px;
}

.form-group{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  color:#cbd5e1;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0f172a;
  color:#fff;
  outline:none;
  transition:.3s;
}

input:focus{
  border-color:#22d3ee;
}

.signup-btn{
  width:100%;
  margin-top:15px;
  padding:14px;
  border-radius:10px;
  background:#22d3ee;
  color:#000;
  font-weight:600;
  border:none;
  cursor:pointer;
  transition:.3s;
}

.signup-btn:hover{
  background:#06b6d4;
}

.login-link{
  text-align:center;
  margin-top:20px;
  font-size:14px;
  color:#94a3b8;
}

.login-link a{
  color:#22d3ee;
  text-decoration:none;
}

.back{
  position:absolute;
  top:20px;
  left:20px;
  color:#94a3b8;
  text-decoration:none;
  font-size:14px;
}
</style>
</head>

<body>

<a href="first.html" class="back">← Back</a>

<div class="signup-container">
  <h2>Create Account</h2>
  <p class="subtitle">Start your 14-day free trial</p>

  <form id="signupForm">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="John Doe" required>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Enter password" required>
    </div>

    <div class="form-group">
      <label>Account Type</label>
      <select id="signup-role" required style="width:100%; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:#fff; outline:none; transition:.3s; appearance:none;">
        <option value="client">Client (Advertiser)</option>
        <option value="affiliate">Affiliate (Publisher)</option>
      </select>
    </div>

    <!-- Error/Success Message Container -->
    <div id="signup-message" style="margin-top: 10px; font-size: 14px; text-align: center; display: none;"></div>

    <button type="submit" class="signup-btn" id="signup-submit">Create Account</button>
  </form>

  <div class="login-link">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script>
  // Point this to your backend's host if the frontend is served separately
  const API_BASE_URL = 'http://127.0.0.1:5000/api'; 

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const role = document.getElementById('signup-role').value;
    const messageEl = document.getElementById('signup-message');
    const submitBtn = document.getElementById('signup-submit');

    // Basic name split for first/last name
    const nameParts = name.trim().split(' ');
    const firstName = nameParts[0];
    const lastName = nameParts.length > 1 ? nameParts.slice(1).join(' ') : '';
    // Generate username from email prefix if logic dictates, or let the backend do it if not strictly required
    const username = email.split('@')[0];

    messageEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.innerText = 'Creating account...';

    try {
      const response = await fetch(`${API_BASE_URL}/auth/register`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({
          email: email,
          username: username,
          password: password,
          first_name: firstName,
          last_name: lastName,
          role: role
        })
      });

      const data = await response.json();

      if (response.ok) {
        messageEl.style.display = 'block';
        messageEl.style.color = '#10b981'; // green
        messageEl.innerText = 'Account created successfully! Redirecting...';
        
        // As per API desc, creating a client/affiliate after base user registration
        if (role === 'client') {
            await fetch(`${API_BASE_URL}/client/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ company_name: `${firstName}'s Company` })
            });
            setTimeout(() => window.location.href = 'client_dashboard.html', 1500);
        } else if (role === 'affiliate') {
            await fetch(`${API_BASE_URL}/affiliate/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            });
            setTimeout(() => window.location.href = 'affiliate_dashboard.html', 1500);
        } else {
            setTimeout(() => window.location.href = 'login.html', 1500);
        }
      } else {
        messageEl.style.display = 'block';
        messageEl.style.color = '#ef4444'; // red
        messageEl.innerText = data.error || data.message || 'Registration failed.';
        submitBtn.disabled = false;
        submitBtn.innerText = 'Create Account';
      }
    } catch (err) {
      console.error(err);
      messageEl.style.display = 'block';
      messageEl.style.color = '#ef4444';
      messageEl.innerText = 'Network error. Make sure the backend is running.';
      submitBtn.disabled = false;
      submitBtn.innerText = 'Create Account';
    }
  });
</script>

</body>
</html>
