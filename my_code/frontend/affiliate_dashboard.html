<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Affiliate Dashboard</h1>
        <div id="affiliate-stats">Loading...</div>
    </div>
    <script>
    window.addEventListener('load', async () => {
        const statsEl = document.getElementById('affiliate-stats');
        try {
            const token = localStorage.getItem('authToken');
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

        const resp = await fetch('/analytics/affiliate', { headers });
            const data = await resp.json();
            if (Array.isArray(data)) {
                let html = '<ul>';
                data.forEach(a => {
                    html += `<li>Affiliate ${a.affiliate_id}: ${a.clicks} clicks</li>`;
                });
                html += '</ul>';
                statsEl.innerHTML = html;
            } else {
                statsEl.textContent = 'No affiliate data yet';
            }
        } catch (err) {
            console.error(err);
            statsEl.textContent = 'Failed to load affiliate data.';
        }
    });
    </script>
</body>
</html>
