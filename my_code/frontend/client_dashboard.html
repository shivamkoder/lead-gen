<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Client Dashboard</h1>
        <div id="client-stats">Loading...</div>
        <h2>Your Campaigns</h2>
        <ul id="campaign-list"></ul>
    </div>
    <script>
    window.addEventListener('load', async () => {
        const statsEl = document.getElementById('client-stats');
        const listEl = document.getElementById('campaign-list');
        try {
            const token = localStorage.getItem('authToken');
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

        const resp = await fetch('/analytics/client', { headers });
            const data = await resp.json();
            statsEl.innerHTML = `<p>Total clicks: ${data.total_clicks}</p><p>Spend: $${data.spend.toFixed(2)}</p>`;

            // now fetch campaigns
            const campsResp = await fetch('/campaigns', { headers });
            if (campsResp.ok) {
                const camps = await campsResp.json();
                if (Array.isArray(camps)) {
                    camps.forEach(c => {
                        const li = document.createElement('li');
                        li.textContent = `${c.name || c.slug} - ${c.cpc}$ per click, budget ${c.budget}`;
                        listEl.appendChild(li);
                    });
                }
            }
        } catch (err) {
            console.error(err);
            statsEl.textContent = 'Failed to load client data.';
        }
    });
    </script>
</body>
</html>
