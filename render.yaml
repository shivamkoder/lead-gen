services:
  - type: web
    name: leadgen-platform
    runtime: python
    region: singapore
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6

      - key: FLASK_ENV
        value: production

      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: leadgen-db
          property: connectionString


databases:
  - name: leadgen-db
    plan: free
